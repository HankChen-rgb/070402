<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitSculpt AI - 隨身智慧體態雕塑與三餐熱量分析</title>
  
  <!-- Load React and ReactDOM from CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Load Babel for JSX compiling in browser -->
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  
  <!-- Load Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind CSS Configuration for custom styling -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            slate: {
              850: '#1e293b95', // semi-transparent
            }
          }
        }
      }
    }
  </script>

  <style>
    /* Custom scrollbar for fluid UI */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0f172a;
    }
    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #10b981;
    }
    /* Simple custom animations */
    @keyframes pulse-slow {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.02); }
    }
    .animate-pulse-slow {
      animation: pulse-slow 3s infinite ease-in-out;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- PRESET SYSTEM DATA ---
    const apiKey = ""; // Users can inject their personal key at runtime or hardcode here.

    const DEFAULT_USER_PROFILE = {
      age: 31,
      gender: 'female',
      height: 165,
      weight: 60,
      activityLevel: '1.55', // Moderately active
      goal: 'lose_fat', // Target deficit
      bmr: 1320,
      tdee: 2046,
      targetCalories: 1646,
      targetProtein: 120,
      targetCarbs: 160,
      targetFat: 50,
    };

    const PRESET_FOODS = [
      {
        name: "舒肥雞胸肉與地瓜時蔬",
        image: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600&auto=format&fit=crop&q=60",
        calories: 420,
        protein: 38,
        carbs: 45,
        fat: 8,
        analysis: "包含舒肥雞胸肉約 150g（優質蛋白質來源），烤地瓜約 120g（低 GI 碳水），以及花椰菜與小番茄。整體膳食纖維豐富，飽足感佳。",
        advice: "這是一頓非常標準的減脂雕塑餐！蛋白質含量充裕，有助於重訓後的肌肉修復與合成。碳水化合物適中，能為您的有氧運動提供穩定能量。"
      },
      {
        name: "香煎鮭魚配藜麥糙米飯",
        image: "https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=600&auto=format&fit=crop&q=60",
        calories: 550,
        protein: 32,
        carbs: 50,
        fat: 22,
        analysis: "煎鮭魚排約 130g 提供豐富的 Omega-3 脂肪酸與蛋白質，搭配藜麥糙米飯約 1碗，以及蘆筍與油漬番茄。",
        advice: "鮭魚的優質脂肪對荷爾蒙健康與關節修復極佳（適合每日重訓的您）。若要加強減脂，可以稍微減少烹調用油，但此組合營養極為均衡！"
      },
      {
        name: "無糖優格燕麥水果碗",
        image: "https://images.unsplash.com/photo-1488477181946-6428a0291777?w=600&auto=format&fit=crop&q=60",
        calories: 320,
        protein: 18,
        carbs: 48,
        fat: 6,
        analysis: "希臘式無糖優格約 200g，燕麥片 30g，綜合莓果與奇異果。點綴少量堅果碎。",
        advice: "非常適合作為早餐或運動前的小點心。莓果富含抗氧化物，能減緩激烈重訓帶來的肌肉發炎，希臘優格則提供了緩釋酪蛋白，持續滋養肌肉。"
      }
    ];

    // --- MAIN REACT COMPONENT ---
    function App() {
      const [userProfile, setUserProfile] = useState(() => {
        const saved = localStorage.getItem('fitsculpt_profile_v2');
        return saved ? JSON.parse(saved) : DEFAULT_USER_PROFILE;
      });

      const [dailyLogs, setDailyLogs] = useState(() => {
        const saved = localStorage.getItem('fitsculpt_logs_v2');
        return saved ? JSON.parse(saved) : {};
      });

      const [selectedDate, setSelectedDate] = useState(() => {
        return new Date().toISOString().split('T')[0];
      });

      const [activeTab, setActiveTab] = useState('dashboard'); // dashboard, analyzer, calculator, history
      
      const [cameraActive, setCameraActive] = useState(false);
      const [capturedImage, setCapturedImage] = useState(null);
      const [mealType, setMealType] = useState('breakfast');
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [analysisResult, setAnalysisResult] = useState(null);
      const [tempApiKey, setTempApiKey] = useState(() => localStorage.getItem('fitsculpt_api_key') || "");
      
      const [manualMeal, setManualMeal] = useState({ name: '', calories: '', protein: '', carbs: '', fat: '' });
      const [exerciseForm, setExerciseForm] = useState({ type: 'strength', duration: 45, intensity: 'medium', notes: '' });
      const [currentWeightInput, setCurrentWeightInput] = useState(userProfile.weight);
      const [toast, setToast] = useState(null);

      const videoRef = useRef(null);
      const canvasRef = useRef(null);

      // --- PERSISTENT UTILITIES ---
      useEffect(() => {
        localStorage.setItem('fitsculpt_profile_v2', JSON.stringify(userProfile));
      }, [userProfile]);

      useEffect(() => {
        localStorage.setItem('fitsculpt_logs_v2', JSON.stringify(dailyLogs));
      }, [dailyLogs]);

      useEffect(() => {
        localStorage.setItem('fitsculpt_api_key', tempApiKey);
      }, [tempApiKey]);

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3500);
      };

      const todayLog = dailyLogs[selectedDate] || {
        meals: [],
        water: 0,
        exercise: null,
        weight: userProfile.weight
      };

      const recalculateTargets = (profile) => {
        const { age, gender, height, weight, activityLevel, goal } = profile;
        
        // Mifflin-St Jeor Formula
        let bmrVal = 0;
        if (gender === 'male') {
          bmrVal = 10 * weight + 6.25 * height - 5 * age + 5;
        } else {
          bmrVal = 10 * weight + 6.25 * height - 5 * age - 161;
        }
        
        const tdeeVal = Math.round(bmrVal * parseFloat(activityLevel));
        let targetCal = tdeeVal;
        let pRatio = 0.3; // protein ratio
        let cRatio = 0.4; // carb ratio
        let fRatio = 0.3; // fat ratio

        if (goal === 'lose_fat') {
          targetCal = Math.round(tdeeVal - 450); 
          pRatio = 0.35; // preserve lean mass
          cRatio = 0.35;
          fRatio = 0.30;
        } else if (goal === 'build_muscle') {
          targetCal = Math.round(tdeeVal + 300);
          pRatio = 0.30;
          cRatio = 0.45;
          fRatio = 0.25;
        }

        if (targetCal < bmrVal) targetCal = Math.round(bmrVal);

        const targetProtein = Math.round((targetCal * pRatio) / 4);
        const targetCarbs = Math.round((targetCal * cRatio) / 4);
        const targetFat = Math.round((targetCal * fRatio) / 9);

        return {
          ...profile,
          bmr: Math.round(bmrVal),
          tdee: tdeeVal,
          targetCalories: targetCal,
          targetProtein,
          targetCarbs,
          targetFat
        };
      };

      const handleProfileChange = (e) => {
        const { name, value } = e.target;
        setUserProfile(prev => {
          const updated = { ...prev, [name]: isNaN(value) ? value : parseFloat(value) };
          return recalculateTargets(updated);
        });
      };

      const startCamera = async () => {
        setCapturedImage(null);
        setCameraActive(true);
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'environment' } 
          });
          if (videoRef.current) {
            videoRef.current.srcObject = stream;
          }
        } catch (err) {
          console.error(err);
          showToast("無法啟用相機，請允許權限、改採手動上傳或體驗預設模擬餐點！", "error");
          setCameraActive(false);
        }
      };

      const stopCamera = () => {
        if (videoRef.current && videoRef.current.srcObject) {
          const tracks = videoRef.current.srcObject.getTracks();
          tracks.forEach(track => track.stop());
        }
        setCameraActive(false);
      };

      const capturePhoto = () => {
        if (videoRef.current && canvasRef.current) {
          const video = videoRef.current;
          const canvas = canvasRef.current;
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const base64 = canvas.toDataURL('image/png');
          setCapturedImage(base64);
          stopCamera();
        }
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            setCapturedImage(reader.result);
          };
          reader.readAsDataURL(file);
        }
      };

      const analyzeImageWithGemini = async (base64Data) => {
        setIsAnalyzing(true);
        setAnalysisResult(null);

        const base64Clean = base64Data.split(',')[1];
        const activeKey = tempApiKey || apiKey;
        
        const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${activeKey}`;
        
        const systemPrompt = `You are an elite fitness nutritionist specialized in body sculpting, weight loss, and daily resistance/cardio tracking. 
Analyze the user's food photo and estimate the food items, portions, calories, and macros.
You must return your response strictly as a JSON object, with absolutely no surrounding markdown wrappers (do NOT use \`\`\`json or \`\`\`).
The output must conform exactly to this schema:
{
  "foodName": "主要食物名稱",
  "calories": 120,
  "protein": 15,
  "carbs": 20,
  "fat": 5,
  "analysis": "詳細的食物內容與份量估算分析...",
  "advice": "針對重訓與有氧健身者的營養與雕塑建議..."
}
Respond fully in Traditional Chinese (繁體中文).`;

        const payload = {
          contents: [{
            role: "user",
            parts: [
              { text: "這是我今天的一餐。請幫我分析其食物內容、估算熱量（大卡）與三大營養素（蛋白質、碳水、脂肪），並給予適合我每日重訓與有氧運動的飲食回饋與體態雕塑建議。" },
              { inlineData: { mimeType: "image/png", data: base64Clean } }
            ]
          }],
          systemInstruction: {
            parts: [{ text: systemPrompt }]
          },
          generationConfig: {
            responseMimeType: "application/json"
          }
        };

        try {
          if (!activeKey) {
            // Trigger beautiful fallback / simulation instantly
            setTimeout(() => {
              const randomPreset = PRESET_FOODS[Math.floor(Math.random() * PRESET_FOODS.length)];
              setAnalysisResult(randomPreset);
              setIsAnalyzing(false);
              showToast("展示模式：已為您載入預設高精準度模擬結果！(輸入 API 金鑰可使用真實圖片辨識)", "info");
            }, 1200);
            return;
          }

          const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (!response.ok) throw new Error(`HTTP: ${response.status}`);
          const result = await response.json();
          const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
          
          if (textResponse) {
            const parsed = JSON.parse(textResponse);
            setAnalysisResult({
              name: parsed.foodName,
              calories: parsed.calories,
              protein: parsed.protein,
              carbs: parsed.carbs,
              fat: parsed.fat,
              analysis: parsed.analysis,
              advice: parsed.advice,
              image: base64Data
            });
            showToast("Gemini 影像辨識成功！", "success");
          } else {
            throw new Error("無效的 API 回應");
          }
        } catch (err) {
          console.error(err);
          showToast("AI 辨識異常，已自動載入預設健康美食供您無障礙體驗！", "error");
          const fallbackPreset = PRESET_FOODS[0];
          setAnalysisResult({ ...fallbackPreset, image: base64Data });
        } finally {
          setIsAnalyzing(false);
        }
      };

      const usePresetFood = (preset) => {
        setCapturedImage(preset.image);
        setAnalysisResult(preset);
        showToast(`已成功套用預設食物：${preset.name}`, "success");
      };

      const saveAnalyzedMealToLog = () => {
        if (!analysisResult) return;

        const newMeal = {
          id: Date.now().toString(),
          type: mealType,
          name: analysisResult.name || analysisResult.foodName,
          calories: parseInt(analysisResult.calories) || 0,
          protein: parseInt(analysisResult.protein) || 0,
          carbs: parseInt(analysisResult.carbs) || 0,
          fat: parseInt(analysisResult.fat) || 0,
          image: analysisResult.image || "https://images.unsplash.com/photo-1498837167922-ddd27525d352?w=600&auto=format&fit=crop&q=60",
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
          analysis: analysisResult.analysis,
          advice: analysisResult.advice
        };

        updateLogForDate(selectedDate, (prevLog) => ({
          ...prevLog,
          meals: [...prevLog.meals, newMeal]
        }));

        showToast(`成功記錄至今天的「${getMealTypeLabel(mealType)}」！`);
        setCapturedImage(null);
        setAnalysisResult(null);
        setActiveTab('dashboard');
      };

      const deleteMeal = (mealId) => {
        updateLogForDate(selectedDate, (prevLog) => ({
          ...prevLog,
          meals: prevLog.meals.filter(m => m.id !== mealId)
        }));
        showToast("已刪除該筆飲食紀錄", "info");
      };

      const handleManualAdd = (e) => {
        e.preventDefault();
        if (!manualMeal.name || !manualMeal.calories) {
          showToast("請至少輸入食物名稱與卡路里！", "error");
          return;
        }

        const newMeal = {
          id: Date.now().toString(),
          type: mealType,
          name: manualMeal.name,
          calories: parseInt(manualMeal.calories) || 0,
          protein: parseInt(manualMeal.protein) || 0,
          carbs: parseInt(manualMeal.carbs) || 0,
          fat: parseInt(manualMeal.fat) || 0,
          image: "https://images.unsplash.com/photo-1498837167922-ddd27525d352?w=600&auto=format&fit=crop&q=60",
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
          analysis: "手動輸入紀錄",
          advice: "無 AI 影像辨識分析，請配合您的 TDEE 目標持續增肌減脂！"
        };

        updateLogForDate(selectedDate, (prevLog) => ({
          ...prevLog,
          meals: [...prevLog.meals, newMeal]
        }));

        showToast(`成功手動登錄：${manualMeal.name}`);
        setManualMeal({ name: '', calories: '', protein: '', carbs: '', fat: '' });
      };

      const updateLogForDate = (date, updateFn) => {
        setDailyLogs(prev => {
          const currentLog = prev[date] || {
            meals: [],
            water: 0,
            exercise: null,
            weight: userProfile.weight
          };
          const updatedLog = updateFn(currentLog);
          return { ...prev, [date]: updatedLog };
        });
      };

      const adjustWater = (amount) => {
        updateLogForDate(selectedDate, (prevLog) => ({
          ...prevLog,
          water: Math.max(0, prevLog.water + amount)
        }));
        showToast(`水分紀錄：${amount > 0 ? '+' : ''}${amount} ml`);
      };

      const handleWeightChange = (e) => {
        const val = parseFloat(e.target.value) || 0;
        setCurrentWeightInput(val);
        updateLogForDate(selectedDate, (prevLog) => ({ ...prevLog, weight: val }));
        setUserProfile(prev => recalculateTargets({ ...prev, weight: val }));
      };

      const handleExerciseSubmit = (e) => {
        e.preventDefault();
        let caloriesBurned = 0;
        const intensityMultiplier = exerciseForm.intensity === 'high' ? 10 : exerciseForm.intensity === 'medium' ? 7 : 4;
        const typeMultiplier = exerciseForm.type === 'both' ? 1.3 : 1.0;
        caloriesBurned = Math.round((intensityMultiplier * userProfile.weight * (exerciseForm.duration / 60)) * typeMultiplier);

        updateLogForDate(selectedDate, (prevLog) => ({
          ...prevLog,
          exercise: { ...exerciseForm, caloriesBurned }
        }));

        showToast(`已儲存運動！今日獲得 ${caloriesBurned} 大卡運動補償！`);
      };

      const removeExercise = () => {
        updateLogForDate(selectedDate, (prevLog) => ({ ...prevLog, exercise: null }));
        showToast("已清除運動紀錄", "info");
      };

      const getMealTypeLabel = (type) => {
        switch (type) {
          case 'breakfast': return '早餐 🌅';
          case 'lunch': return '午餐 ☀️';
          case 'dinner': return '晚餐 🌙';
          case 'snack': return '點心 🍎';
          default: return '餐點';
        }
      };

      const loggedMeals = todayLog.meals || [];
      const totalConsumedCalories = loggedMeals.reduce((acc, m) => acc + m.calories, 0);
      const totalConsumedProtein = loggedMeals.reduce((acc, m) => acc + m.protein, 0);
      const totalConsumedCarbs = loggedMeals.reduce((acc, m) => acc + m.carbs, 0);
      const totalConsumedFat = loggedMeals.reduce((acc, m) => acc + m.fat, 0);
      const exerciseCaloriesBurned = todayLog.exercise ? todayLog.exercise.caloriesBurned : 0;
      
      const dynamicTargetCalories = userProfile.targetCalories + exerciseCaloriesBurned;
      const remainingCalories = dynamicTargetCalories - totalConsumedCalories;

      const handleResetAllData = () => {
        if (confirm("確定要重設所有數據嗎？這將徹底刪除本瀏覽器中的所有飲食、水分與運動明細！")) {
          localStorage.removeItem('fitsculpt_profile_v2');
          localStorage.removeItem('fitsculpt_logs_v2');
          localStorage.removeItem('fitsculpt_api_key');
          setUserProfile(DEFAULT_USER_PROFILE);
          setDailyLogs({});
          setTempApiKey("");
          showToast("所有資料已安全重設", "info");
        }
      };

      return (
        <div className="min-h-screen pb-24 sm:pb-8">
          {/* Toast Alert */}
          {toast && (
            <div className={`fixed top-4 right-4 z-50 flex items-center p-4 rounded-xl shadow-2xl border transition-all duration-300 ${
              toast.type === 'error' ? 'bg-rose-950 border-rose-500 text-rose-200' :
              toast.type === 'info' ? 'bg-sky-950 border-sky-500 text-sky-200' :
              'bg-emerald-950 border-emerald-500 text-emerald-200'
            }`}>
              <span className="mr-2 font-bold">{toast.type === 'error' ? '⚠️' : '✨'}</span>
              <span className="text-sm font-semibold">{toast.message}</span>
            </div>
          )}

          {/* Top Navbar */}
          <header className="border-b border-slate-800 bg-slate-900/90 backdrop-blur sticky top-0 z-40">
            <div className="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="p-2.5 bg-gradient-to-tr from-emerald-500 to-teal-400 rounded-2xl shadow-lg shadow-emerald-500/20">
                  <svg className="w-8 h-8 text-slate-950" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
                  </svg>
                </div>
                <div>
                  <h1 className="text-xl sm:text-2xl font-black bg-gradient-to-r from-emerald-400 via-teal-300 to-cyan-400 bg-clip-text text-transparent">
                    FitSculpt AI
                  </h1>
                  <p className="text-xs text-slate-400 font-medium tracking-wide">隨身智慧體能訓練與三餐卡路里分析系統</p>
                </div>
              </div>

              {/* Date controller */}
              <div className="flex items-center gap-3 bg-slate-900/90 p-1.5 rounded-2xl border border-slate-800">
                <button
                  onClick={() => {
                    const prev = new Date(selectedDate);
                    prev.setDate(prev.getDate() - 1);
                    setSelectedDate(prev.toISOString().split('T')[0]);
                  }}
                  className="p-2 hover:bg-slate-800 rounded-xl transition text-slate-300 hover:text-white"
                >
                  ◀
                </button>
                <input
                  type="date"
                  value={selectedDate}
                  onChange={(e) => setSelectedDate(e.target.value)}
                  className="bg-transparent text-sm font-bold text-emerald-400 text-center focus:outline-none cursor-pointer"
                />
                <button
                  onClick={() => {
                    const next = new Date(selectedDate);
                    next.setDate(next.getDate() + 1);
                    setSelectedDate(next.toISOString().split('T')[0]);
                  }}
                  className="p-2 hover:bg-slate-800 rounded-xl transition text-slate-300 hover:text-white"
                >
                  ▶
                </button>
              </div>
            </div>
          </header>

          {/* Main Layout Area */}
          <main className="max-w-6xl mx-auto px-4 py-8">
            
            {/* Nav Tabs */}
            <div className="flex bg-slate-900/60 p-1 rounded-2xl border border-slate-800/80 mb-8 overflow-x-auto no-scrollbar gap-1">
              <button
                onClick={() => setActiveTab('dashboard')}
                className={`flex-1 py-3 px-4 rounded-xl text-sm font-bold transition-all duration-200 whitespace-nowrap flex items-center justify-center gap-2 ${
                  activeTab === 'dashboard' ? 'bg-gradient-to-r from-emerald-500 to-teal-500 text-slate-950 shadow-md shadow-emerald-500/10' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-900'
                }`}
              >
                📊 每日儀表板
              </button>
              <button
                onClick={() => setActiveTab('analyzer')}

  </script>
